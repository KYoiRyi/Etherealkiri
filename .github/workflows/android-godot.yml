name: Android Build

on:
  push:
    branches: [ "main", "refactor/godot-native-renderer" ]
  workflow_dispatch:

jobs:
  build:
    name: Build Android App (Godot)
    runs-on: ubuntu-latest
    permissions:
      packages: write
      contents: read
    env:
      CCACHE_DIR: ${{ github.workspace }}/.ccache

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Build Systems
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake ninja-build pkg-config ccache wget unzip autoconf automake libtool bison mono-complete

      - name: Set up Java
        uses: actions/setup-java@v3
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Download Godot
        run: |
          wget -q https://github.com/godotengine/godot/releases/download/4.3-stable/Godot_v4.3-stable_linux.x86_64.zip
          unzip -q Godot_v4.3-stable_linux.x86_64.zip
          sudo mv Godot_v4.3-stable_linux.x86_64 /usr/local/bin/godot

      - name: Download Godot Android Export Templates
        run: |
          mkdir -p ~/.local/share/godot/export_templates/4.3.stable
          wget -q https://github.com/godotengine/godot/releases/download/4.3-stable/Godot_v4.3-stable_export_templates.tpz
          unzip -q Godot_v4.3-stable_export_templates.tpz
          mv templates/* ~/.local/share/godot/export_templates/4.3.stable/

      - name: Detect Android SDK and NDK
        run: |
          set -euo pipefail
          if [[ -z "${ANDROID_HOME:-}" ]]; then
            echo "ANDROID_HOME=$HOME/Library/Android/sdk" >> "$GITHUB_ENV"
            sdk_root="$HOME/Library/Android/sdk"
          else
            echo "ANDROID_HOME=${ANDROID_HOME}" >> "$GITHUB_ENV"
            sdk_root="${ANDROID_HOME}"
          fi

          if [[ -d "${sdk_root}/ndk" ]]; then
            latest_ndk="$(find "${sdk_root}/ndk" -maxdepth 1 -mindepth 1 -type d | sort -V | tail -1)"
            latest_ndk_version="$(basename "${latest_ndk}")"
            echo "ANDROID_NDK_HOME=${latest_ndk}" >> "$GITHUB_ENV"
            echo "ANDROID_NDK_VERSION=${latest_ndk_version}" >> "$GITHUB_ENV"
          else
            echo "Android NDK directory not found under ${sdk_root}/ndk" >&2
            exit 1
          fi

      - name: Setup vcpkg
        run: |
          git clone https://github.com/microsoft/vcpkg.git .devtools/vcpkg
          .devtools/vcpkg/bootstrap-vcpkg.sh

      - name: Setup vcpkg NuGet binary cache
        run: |
          cat <<EOF > nuget.config
          <?xml version="1.0" encoding="utf-8"?>
          <configuration>
            <packageSources>
              <clear />
              <add key="GitHub" value="https://nuget.pkg.github.com/${{ github.repository_owner }}/index.json" />
            </packageSources>
            <packageSourceCredentials>
              <GitHub>
                <add key="Username" value="${{ github.actor }}" />
                <add key="ClearTextPassword" value="${{ secrets.GITHUB_TOKEN }}" />
              </GitHub>
            </packageSourceCredentials>
          </configuration>
          EOF
          echo "VCPKG_BINARY_SOURCES=clear;nuget,GitHub,readwrite;nugetconfig,${GITHUB_WORKSPACE}/nuget.config" >> $GITHUB_ENV
          echo "VCPKG_NUGET_REPOSITORY=https://github.com/${{ github.repository }}" >> $GITHUB_ENV


      - name: Build Android Release
        run: |
          chmod +x ./build.sh
          export CMAKE_C_COMPILER_LAUNCHER=ccache
          export CMAKE_CXX_COMPILER_LAUNCHER=ccache
          export NDK_CCACHE=ccache
          export CMAKE_MAKE_PROGRAM=$(which ninja-build)
          export GODOT_BIN="godot"

          ./build.sh android release --abi=arm64-v8a --jobs=4

      - name: Upload vcpkg Logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: vcpkg-logs
          path: |
            out/**/*.log
            .devtools/vcpkg/**/*.log
          retention-days: 1

      - name: Upload Artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: AetherKiri-Godot-Android-APK
          path: out/godot/android/release/*.apk
          retention-days: 7
