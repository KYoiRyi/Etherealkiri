name: Android Vcpkg Cache (Godot)

on:
  workflow_dispatch:
  push:
    paths:
      - 'vcpkg.json'
      - '.github/workflows/android-vcpkg-godot.yml'
    branches:
      - main
      - refactor/godot-native-renderer

jobs:
  build-vcpkg:
    name: Build Android vcpkg packages
    runs-on: ubuntu-latest
    permissions:
      packages: write
      contents: read

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake ninja-build pkg-config curl unzip zip zstd jq

      - name: Detect Android SDK and NDK
        run: |
          set -euo pipefail
          echo "ANDROID_HOME=${ANDROID_HOME:-$HOME/Android/Sdk}" >> "$GITHUB_ENV"
          sdk_root="${ANDROID_HOME:-$HOME/Android/Sdk}"
          if [[ -d "${sdk_root}/ndk" ]]; then
            latest_ndk="$(find "${sdk_root}/ndk" -maxdepth 1 -mindepth 1 -type d | sort -V | tail -1)"
            echo "ANDROID_NDK_HOME=${latest_ndk}" >> "$GITHUB_ENV"
          else
            echo "Android NDK directory not found under ${sdk_root}/ndk" >&2
            exit 1
          fi

      - name: Setup vcpkg
        run: |
          git clone https://github.com/microsoft/vcpkg.git .devtools/vcpkg
          .devtools/vcpkg/bootstrap-vcpkg.sh

      - name: Setup vcpkg NuGet binary cache
        run: |
          dotnet nuget add source "https://nuget.pkg.github.com/${{ github.repository_owner }}/index.json" \
            --name "GitHub" \
            --username "${{ github.actor }}" \
            --password "${{ secrets.GITHUB_TOKEN }}" \
            --store-password-in-clear-text
          echo "VCPKG_BINARY_SOURCES=clear;nuget,GitHub,readwrite" >> $GITHUB_ENV

      - name: Build Android vcpkg dependencies
        run: |
          export VCPKG_ROOT="${GITHUB_WORKSPACE}/.devtools/vcpkg"
          export CMAKE_MAKE_PROGRAM=$(which ninja)
          
          # Use --keep-going so it doesn't immediately stop on first failure,
          # and because binary cache pushes each package immediately after success,
          # even if the workflow fails at the end, the successful packages are permanently saved!
          "$VCPKG_ROOT/vcpkg" install \
            --triplet "arm64-android" \
            --x-install-root="$VCPKG_ROOT/installed" \
            --x-manifest-root="${GITHUB_WORKSPACE}" \
            --keep-going
